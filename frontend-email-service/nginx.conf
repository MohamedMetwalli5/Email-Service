# ==========================================================
# PRODUCTION CONFIGURATION (SSL/HTTPS)
# ==========================================================
server {
    listen 80;
    server_name seamail.site www.seamail.site;
    return 301 https://seamail.site$request_uri;
}

server {
    listen 443 ssl;
    server_name www.seamail.site;
    ssl_certificate /etc/letsencrypt/live/seamail.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seamail.site/privkey.pem;
    return 301 https://seamail.site$request_uri;
}

server {
    listen 443 ssl;
    server_name seamail.site;
    ssl_certificate /etc/letsencrypt/live/seamail.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seamail.site/privkey.pem;
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    location /api/v1/ {
        proxy_pass http://spring_backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
